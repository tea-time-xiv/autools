name: Build Autools

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  build:
    runs-on: windows-2022

    env:
      Solution_Name: Autools

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Read version from csproj
      run: |
        $version = ([xml](Get-Content "Autools/Autools.csproj")).Project.PropertyGroup.Version
        "VERSION=$version" >> $env:GITHUB_ENV

    - name: Check if release tag exists
      run: |
        git fetch --tags
        $tag = "v$env:VERSION"
        $exists = git tag -l $tag
        $skip = if ($exists) { "true" } else { "false" }
        "SKIP_RELEASE=$skip" >> $env:GITHUB_ENV

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Build with dotnet
      run: dotnet build --configuration Release

    - name: Package plugin
      run: |
        Push-Location ".\Autools\bin\x64\Release"
        Compress-Archive -Path "Autools.dll", "Autools.json" -DestinationPath "$env:GITHUB_WORKSPACE\Autools.zip"
        Pop-Location

    - name: Store artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Autools
        path: Autools.zip
        if-no-files-found: error
        retention-days: 1

    - name: Release
      if: github.event_name == 'push' && env.SKIP_RELEASE == 'false'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "Autools.zip"
        tag: v${{ env.VERSION }}
        name: Autools v${{ env.VERSION }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update pluginmaster
      if: github.event_name == 'push' && env.SKIP_RELEASE == 'false'
      shell: pwsh
      env:
        PLUGINMASTER_TOKEN: ${{ secrets.PLUGINMASTER_TOKEN }}
      run: |
        git clone https://x-access-token:$env:PLUGINMASTER_TOKEN@github.com/tea-time-xiv/pluginmaster.git pluginmaster-repo
        $version = $env:VERSION
        $downloadUrl = "https://github.com/tea-time-xiv/autools/releases/download/v$version/Autools.zip"
        $lastUpdate = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
        $entry = [ordered]@{
            Author             = "tea-time-xiv"
            Name               = "Autools"
            Punchline          = "Automation utilities for FFXIV"
            Description        = "Quality of life automation features including auto Priority Aetheryte Pass usage (/passauto) and auto-cancel Jog buff after Sprint expires (/nojog)."
            Changelog          = "- $version"
            IsHide             = $false
            InternalName       = "Autools"
            AssemblyVersion    = $version
            IsTestingExclusive = $false
            ApplicableVersion  = "any"
            DalamudApiLevel    = 15
            DownloadCount      = 0
            LastUpdate         = $lastUpdate
            DownloadLinkInstall = $downloadUrl
            DownloadLinkUpdate  = $downloadUrl
        }
        $existing = Get-Content "pluginmaster-repo/pluginmaster.json" | ConvertFrom-Json
        $filtered = @($existing | Where-Object { $_.InternalName -ne "Autools" })
        $merged = $filtered + @($entry)
        $json = $merged | ConvertTo-Json -Depth 3
        Set-Content "pluginmaster-repo/pluginmaster.json" $json -Encoding utf8NoBOM
        Push-Location pluginmaster-repo
        git symbolic-ref HEAD refs/heads/master
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pluginmaster.json
        git commit -m "Release v$version"
        git push -u origin master
        Pop-Location
